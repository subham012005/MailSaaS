services:
  - type: web
    name: decision-intelligence-backend
    runtime: python
    region: singapore          # Closest to India — change to 'ohio' for USA
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SELF_URL
        sync: false            # Set this to your Render public URL after first deploy
                               # e.g. https://decision-intelligence-backend.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://www.smartemail.in
    healthCheckPath: /health
